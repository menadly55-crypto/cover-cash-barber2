<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل العضوية</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="card">
        <h1>تسجيل العضوية 📝</h1>
        <p class="note">برجاء إدخال بياناتك بدقة لتفعيل الكارت الرقمي</p>
        <hr class="divider">
        
        <input id="name" type="text" placeholder="الاسم بالكامل">
        <input id="phone" type="tel" placeholder="رقم الهاتف">
        <br><br>

        <button onclick="saveData()">إرسال طلب التفعيل للحلاق 🚀</button>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBaqOvkSo08ym2_bfw8LYjzEBr3_fgo5FY",
          authDomain: "cover-cash-barber.firebaseapp.com",
          databaseURL: "https://cover-cash-barber-default-rtdb.firebaseio.com/", 
          projectId: "cover-cash-barber",
          storageBucket: "cover-cash-barber.firebasestorage.app",
          messagingSenderId: "753180043275",
          appId: "1:753180043275:web:0d08612be42a5daa3e7f0e",
          measurementId: "G-KHQ9L8JPWK"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function saveData() {
            let name = document.getElementById("name").value.trim();
            let phone = document.getElementById("phone").value.trim();

            if (name === "" || phone === "") {
                alert("من فضلك أدخل الاسم ورقم الهاتف!");
                return;
            }

            let urlParams = new URLSearchParams(window.location.search);
            let barberId = urlParams.get('barber') || "default_barber";

            database.ref(`barbers/${barberId}/pendingClients/${phone}`).set({
                name: name,
                phone: phone,
                visits: 0,
                status: "pending",
                activeSession: false
            }).then(() => {
                localStorage.setItem("currentClientPhone", phone);
                localStorage.setItem("currentClientBarber", barberId);
                
                alert("✅ تم إرسال طلبك بنجاح! برجاء دفع الـ 50 جنيه للحلاق لتفعيل كارتك فوراً.");
                window.location.href = "welcome.html"; // التوجيه لصفحة الكارت الرقمي للزبون
            }).catch(err => {
                alert("خطأ في الاتصال بالسيرفر: " + err.message);
            });
        }
    </script>
</body>
</html>
